name: build-exe

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          python -m PyInstaller --clean --onefile --windowed app.py --name keyword_tool --hidden-import=google.generativeai --hidden-import=google.ai.generativelanguage --hidden-import=feedparser --collect-all google-generativeai --collect-all feedparser

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keyword_tool
          path: dist/keyword_tool.exe
