name: build-exe

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: pip install requests pyinstaller

    - name: Build EXE
      run: pyinstaller --onefile keyword_tool.py

    - name: Upload Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/keyword_tool.exe
